<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback Form</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 450px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #555;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        #submitBtn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        #submitBtn:hover {
            background-color: #45a049;
        }

        /* Error message style */
        .error-msg {
            color: red;
            font-size: 13px;
            margin-top: 3px;
        }

        /* Success message style */
        #successMsg {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 5px;
            text-align: center;
            font-size: 15px;
        }
    </style>
</head>

<body>

    <div class="form-container">
        <h2>📝 Student Feedback Form</h2>

        <form id="feedbackForm">
            <!-- Name Field -->
            <label for="name">Name:</label>
            <input type="text" id="name" placeholder="Enter your name">
            <span id="nameError" class="error-msg"></span>

            <!-- Email Field -->
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter your email">
            <span id="emailError" class="error-msg"></span>

            <!-- Course Rating Dropdown -->
            <label for="rating">Course Rating:</label>
            <select id="rating">
                <option value="">-- Select Rating --</option>
                <option value="Excellent">⭐ Excellent</option>
                <option value="Good">⭐ Good</option>
                <option value="Average">⭐ Average</option>
                <option value="Poor">⭐ Poor</option>
            </select>

            <!-- Comments Field -->
            <label for="comments">Comments:</label>
            <textarea id="comments" placeholder="Write your feedback here..."></textarea>

            <!-- Submit Button -->
            <button type="button" id="submitBtn">Submit Feedback</button>
        </form>

        <!-- Success Message (hidden by default) -->
        <div id="successMsg"></div>
    </div>

    <script>
        // ========== jQuery Code ==========

        $(document).ready(function () {

            // When user clicks the Submit button
            $("#submitBtn").click(function () {

                // Step 1: Clear old error messages
                $(".error-msg").text("");
                $("#successMsg").hide();

                // Step 2: Get values from form fields using jQuery
                var name = $("#name").val().trim();
                var email = $("#email").val().trim();
                var rating = $("#rating").val();
                var comments = $("#comments").val().trim();

                var isValid = true;

                // Step 3: Validate Name (should not be empty)
                if (name === "") {
                    $("#nameError").text("⚠️ Please enter your name.");
                    isValid = false;
                }

                // Step 4: Validate Email (should not be empty)
                if (email === "") {
                    $("#emailError").text("⚠️ Please enter your email.");
                    isValid = false;
                }

                // Step 5: If everything is valid, show success message
                if (isValid) {
                    // Build the success message with user's data
                    var message = "✅ Thank you, <strong>" + name + "</strong>! Your feedback has been submitted successfully.";

                    // Show the message using jQuery DOM manipulation
                    $("#successMsg").html(message).fadeIn();

                    // Step 6: Clear all form fields after submission
                    $("#name").val("");
                    $("#email").val("");
                    $("#rating").val("");
                    $("#comments").val("");
                }
            });

        });
    </script>

</body>

</html>
